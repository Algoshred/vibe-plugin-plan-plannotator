# CI — Test, build, publish to npmjs (every push to main)
#
# Push to main: test → build → CalVer version bump → publish to npmjs (public).
# PRs: test + build only (no publish).
#
# CalVer: YYYY.MDD.PATCH (semver-compatible, no zero-padding)
# Scope: @vibecontrols/* (public on npmjs)

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: |
          if jq -e '.scripts["format:check"]' package.json >/dev/null 2>/dev/null; then
            bun run format:check
          else
            echo "Skipping format:check"
          fi

      - name: Lint
        run: |
          if jq -e '.scripts.lint' package.json >/dev/null 2>/dev/null && ( [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f eslint.config.cjs ] ); then
            bun run lint
          else
            echo "Skipping lint: no lint script or eslint config"
          fi

      - name: Type check
        run: |
          if jq -e '.scripts["type:check"]' package.json >/dev/null 2>/dev/null; then
            bun run type:check
          elif jq -e '.scripts.typecheck' package.json >/dev/null 2>/dev/null; then
            bun run typecheck
          else
            echo "Skipping type check"
          fi

      - name: Test
        run: |
          if jq -e '.scripts.test' package.json >/dev/null 2>/dev/null; then
            bun run test
          else
            echo "Skipping test: no test script"
          fi

      - name: Build
        run: bun run build

  # Aggregator status required by the `main` branch ruleset ("Branch Push
  # Protection" → required check "PR Gate"). Without a job reporting a
  # "PR Gate" check, that required context sits at "Expected — waiting for
  # status to be reported" forever and blocks every PR.
  pr-gate:
    name: PR Gate
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          result="${{ needs.test.result }}"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "::error::Test & Build $result — PR Gate fails"
            exit 1
          fi
          echo "Test & Build passed — PR Gate green"

  publish-npmjs:
    name: Publish to npmjs
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Setup Node (for npm publish + version arithmetic)
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          scope: "@vibecontrols"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish to npmjs
        # Dead-simple publish: the version is whatever is in package.json.
        # Bump it manually before merging to main. The publish silently
        # no-ops if that version is already on the registry — see the
        # `if: github.event.head_commit.message` gate in release.yml for
        # opt-in republish on the same version.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PKG=$(jq -r .name package.json)
          VERSION=$(jq -r .version package.json)
          if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG@$VERSION already on npmjs — skipping publish."
            exit 0
          fi
          npm publish --access public --tag latest

      - name: Create git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"
