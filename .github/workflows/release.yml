# Release — manual workflow_dispatch to publish a specific CalVer version
#
# Triggered manually (or by pushing a CalVer git tag). The normal `ci.yml`
# workflow auto-publishes on every push to main; this workflow exists for
# operator-controlled releases (e.g. backporting a fix to a specific tag).

name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "CalVer version (e.g., 2026.521.1)."
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release to npmjs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          scope: "@vibecontrols"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install

      - name: Lint & type check
        run: bun run lint && bun run type:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Set package.json version
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version=$v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
